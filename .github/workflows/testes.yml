name: testes
# Roda a suite do mipcore (identidades TRU, controles Leontief, aditividade e
# telescopagem de cadeia, SDA, ligacoes puras GHS, leitor CNT) a cada push/PR.
# Sao 26 testes num runner limpo: os 14 testes regionais (matrizes IIOAS 2011/2019
# nao-versionadas) sao pulados pelo conftest; rodam so na maquina de dev que as tem.
#
# Dois jobs (matriz), que dao significados diferentes ao verde:
#   faixas  (Python 3.11) -- instala das FAIXAS ABSTRATAS do pyproject; verde = o
#                            pacote instala do zero no Python minimo suportado.
#   lock    (Python 3.13) -- instala do MIP/requirements.lock (numpy 2.5.1 exige
#                            Python >=3.12); verde = o AMBIENTE FIXADO ainda reproduz.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - nome: faixas
            python: "3.11"
            modo: faixas
          - nome: lock
            python: "3.13"
            modo: lock
    name: pytest (${{ matrix.nome }})
    defaults:
      run:
        working-directory: MIP
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Instalar (faixas abstratas)
        if: matrix.modo == 'faixas'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Instalar (ambiente fixado do lock)
        if: matrix.modo == 'lock'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e . --no-deps
          pip install pytest
      - name: Rodar testes
        run: pytest -q
